<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atelier — indisponible</title>
<!-- Page de secours AUTONOME (zéro asset externe) servie par le service worker
     quand une navigation échoue réseau (Atelier down : restart, mise à jour
     autonome, crash). Elle sonde /api/health et se recharge au retour. -->
<style>
  :root { color-scheme: light dark; }
  * { margin: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #f9fafb; color: #111827; padding: 16px;
  }
  body.dark { background: #030712; color: #f9fafb; }
  .card {
    max-width: 26rem; width: 100%; text-align: center; padding: 32px 28px;
    border: 1px solid #e5e7eb; border-radius: 14px; background: #ffffff;
    box-shadow: 0 20px 50px rgba(0,0,0,.12);
  }
  body.dark .card { border-color: #1f2937; background: #111827; }
  .spin {
    width: 40px; height: 40px; margin: 0 auto 18px; border-radius: 50%;
    border: 3px solid #dbeafe; border-top-color: #2563eb;
    animation: r 0.9s linear infinite;
  }
  body.dark .spin { border-color: #1e3a5f; border-top-color: #60a5fa; }
  @keyframes r { to { transform: rotate(360deg); } }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
  p { font-size: 14px; line-height: 1.55; color: #4b5563; }
  body.dark p { color: #9ca3af; }
  .hint { margin-top: 14px; font-size: 12px; color: #6b7280; }
</style>
</head>
<body>
<div class="card">
  <div class="spin"></div>
  <h1>Atelier est momentanément indisponible</h1>
  <p>Le service redémarre — mise à jour ou maintenance en cours.<br>
     Cette page se rechargera automatiquement dès son retour.</p>
  <div class="hint" id="hint">vérification en cours…</div>
</div>
<script>
  // Même clé de thème que les deux apps (pré-paint de index.html/studio.html).
  try {
    var t = localStorage.getItem('atelier:theme');
    if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.body.classList.add('dark');
    }
  } catch (e) { /* ignore */ }

  var tries = 0;
  function probe() {
    tries += 1;
    fetch('/api/health', { cache: 'no-store' })
      .then(function (r) {
        if (r.ok) { location.reload(); return; }
        schedule();
      })
      .catch(schedule);
  }
  function schedule() {
    document.getElementById('hint').textContent =
      'toujours indisponible — nouvelle vérification dans 3 s (essai ' + tries + ')';
    setTimeout(probe, 3000);
  }
  setTimeout(probe, 1500);
</script>
</body>
</html>
